<!DOCTYPE html>
<html lang="en">
<head>
    <title>Subtitle Translator</title>
</head>
<body>
<div id="SubtitleTranslatorConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select">
    <div data-role="content">
        <div class="content-primary">
            <form id="SubtitleTranslatorConfigForm">
                <div class="inputContainer">
                    <input is="emby-input" id="ApiUrl" name="ApiUrl" type="text" label="OpenAI API URL" />
                </div>
                <div class="inputContainer">
                    <input is="emby-input" id="ApiKey" name="ApiKey" type="password" label="OpenAI API key (or OPENAI_API_KEY env)" />
                </div>
                <div class="inputContainer">
                    <input is="emby-input" id="Model" name="Model" type="text" label="Model" />
                </div>
                <div class="inputContainer">
                    <input is="emby-input" id="SourceLanguage" name="SourceLanguage" type="text" label="Source language (auto)" />
                </div>
                <div class="inputContainer">
                    <input is="emby-input" id="TargetLanguage" name="TargetLanguage" type="text" label="Target language (es)" />
                </div>
                <div class="inputContainer">
                    <input is="emby-input" id="BatchSize" name="BatchSize" type="number" label="Cues per request" />
                </div>
                <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                    <span>Save</span>
                </button>
            </form>

            <h2 style="margin-top:2em;">Translate embedded subtitle</h2>
            <div class="inputContainer">
                <input is="emby-input" id="ItemSearch" type="text" label="Search title" />
            </div>
            <button is="emby-button" type="button" id="BtnSearch" class="raised block emby-button"><span>Search</span></button>
            <div class="selectContainer">
                <label class="selectLabel" for="ItemSelect">Item / track</label>
                <select is="emby-select" id="ItemSelect" class="emby-select"></select>
            </div>
            <button is="emby-button" type="button" id="BtnTranslate" class="raised button-submit block emby-button"><span>Translate now</span></button>
            <p id="TranslateStatus"></p>
        </div>
    </div>
    <script type="text/javascript">
        var pluginId = "b6f8a3d2-4c1e-4f9a-9e2b-7a1c5d3e8f01";
        document.querySelector('#SubtitleTranslatorConfigPage').addEventListener('pageshow', function () {
            Dashboard.showLoadingMsg();
            ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                document.querySelector('#ApiUrl').value = config.ApiUrl || '';
                document.querySelector('#ApiKey').value = config.ApiKey || '';
                document.querySelector('#Model').value = config.Model || '';
                document.querySelector('#SourceLanguage').value = config.SourceLanguage || '';
                document.querySelector('#TargetLanguage').value = config.TargetLanguage || '';
                document.querySelector('#BatchSize').value = config.BatchSize || 40;
                Dashboard.hideLoadingMsg();
            });
        });
        document.querySelector('#SubtitleTranslatorConfigForm').addEventListener('submit', function (e) {
            e.preventDefault();
            Dashboard.showLoadingMsg();
            ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                config.ApiUrl = document.querySelector('#ApiUrl').value;
                config.ApiKey = document.querySelector('#ApiKey').value;
                config.Model = document.querySelector('#Model').value;
                config.SourceLanguage = document.querySelector('#SourceLanguage').value;
                config.TargetLanguage = document.querySelector('#TargetLanguage').value;
                config.BatchSize = parseInt(document.querySelector('#BatchSize').value, 10) || 40;
                ApiClient.updatePluginConfiguration(pluginId, config).then(Dashboard.processPluginConfigurationUpdateResult);
            });
            return false;
        });
        document.querySelector('#BtnSearch').addEventListener('click', function () {
            Dashboard.showLoadingMsg();
            var q = encodeURIComponent(document.querySelector('#ItemSearch').value || '');
            ApiClient.ajax({ type: 'GET', url: ApiClient.getUrl('SubtitleTranslator/Candidates?search=' + q), dataType: 'json' }).then(function (items) {
                var sel = document.querySelector('#ItemSelect');
                sel.innerHTML = '';
                items.forEach(function (it) {
                    it.Streams.forEach(function (s) {
                        var o = document.createElement('option');
                        o.value = it.Id + '|' + s.Index;
                        o.textContent = it.Name + '  ' + s.Label;
                        sel.appendChild(o);
                    });
                });
                Dashboard.hideLoadingMsg();
            });
        });
        document.querySelector('#BtnTranslate').addEventListener('click', function () {
            var v = document.querySelector('#ItemSelect').value;
            if (!v) { return; }
            var parts = v.split('|');
            Dashboard.showLoadingMsg();
            document.querySelector('#TranslateStatus').textContent = 'Translating...';
            ApiClient.ajax({ type: 'POST', url: ApiClient.getUrl('SubtitleTranslator/Translate'), contentType: 'application/json',
                data: JSON.stringify({ ItemId: parts[0], StreamIndex: parseInt(parts[1], 10), TargetLanguage: document.querySelector('#TargetLanguage').value }) })
                .then(function (r) { document.querySelector('#TranslateStatus').textContent = 'Saved: ' + r.saved; Dashboard.hideLoadingMsg(); })
                .catch(function () { document.querySelector('#TranslateStatus').textContent = 'Translation failed. Check logs.'; Dashboard.hideLoadingMsg(); });
        });
    </script>
</div>
</body>
</html>
